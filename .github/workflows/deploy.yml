# Deploy Astro site to GitHub Pages
# Official withastro/action handles install + build + artifact upload.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]   # 推送到 main 自动部署
  workflow_dispatch:    # 也可在 Actions 页面手动触发

# GitHub Pages 部署所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署,新推送不打断进行中的部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3   # 自动检测包管理器、安装、build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
